# ShinkaEvolve config for self-play novelty SVG art evolution.
# CLI: shinka_run --task-dir <workspace> --results_dir <workspace>/results
#               --num_generations <N> --config-fname shinka.yaml

max_evaluation_jobs: 1
max_proposal_jobs: 1
max_db_workers: 1

evo_config:
  task_sys_msg: |
    Write a Python function named "def generate_svg(rng: int) -> str" that
    returns a complete, self-contained, colored SVG artwork as a string.

    CRITICAL REQUIREMENT: The function is the ONLY code that runs. Every import
    (math, random, colorsys, itertools, etc.) MUST appear inside the function
    body. There are no module-level imports available. Missing imports will cause
    a NameError and score zero.

    Example structure:
      def generate_svg(rng: int) -> str:
          import math, random, colorsys
          gen = random.Random(rng)
          # ... rest of code

    ${svg_art_theme_block}

    Evaluation renders four stochastic samples into a 2x2 gallery image and
    asks a multimodal judge to rank it against opponent galleries for divergence,
    aesthetic coherence, mechanism breadth, surprise, and theme alignment.

    Improve by creating images that are visually compelling, distinct from likely
    opponents, and rich enough to become strong future opponents. Avoid one-template
    parameter variation, random clutter, broken SVG, external resources, scripts,
    foreignObject, or output explosions. Prefer bounded element counts, reusable
    <defs>, compact numeric precision, and shared styling where possible.

    FORMATTING RULE: Output ONLY the complete Python function. Do NOT include
    EVOLVE-BLOCK-START, EVOLVE-BLOCK-END, or any other special block markers.
    Do NOT include markdown fences or any text outside the function definition.

  patch_types: ["full"]
  patch_type_probs: [1.0]
  llm_models: ["gemini-3-flash-preview"]
  llm_kwargs:
    temperatures: [0.7, 1.0]
    max_tokens: 16384
  # NOTE: Do NOT add thinking_budget here. ShinkaEvolve sets it automatically
  # for reasoning models (thinking_budget=0 when reasoning_efforts="disabled").
  meta_rec_interval: 5
  meta_llm_models: ["gemini-3-flash-preview"]
  meta_llm_kwargs:
    temperatures: [0.0]
    max_tokens: 8192
  embedding_model: "gemini-embedding-001"
  novelty_llm_models: ["gemini-3-flash-preview"]
  novelty_llm_kwargs:
    temperatures: [0.0]
  use_text_feedback: true
  max_api_costs: 2.0
  max_patch_resamples: 2
  max_patch_attempts: 2
  max_novelty_attempts: 2

db_config:
  num_islands: 1
  archive_size: 20
  elite_selection_ratio: 0.4
  num_archive_inspirations: 2
  num_top_k_inspirations: 1

job_config:
  # Use the .venv python so evaluate.py has access to all dependencies.
  python_executable: /path/to/.venv/bin/python
  extra_cmd_args:
    # Use absolute path — evaluate.py is copied to a temp dir by Shinka
    # and relative paths will not resolve correctly.
    opponents_dir: /absolute/path/to/task/opponents
    n_opponents: 3
    n_games: 2
    base_seed: 42
    judge_model: gemini-3-flash-preview
