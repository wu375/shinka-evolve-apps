# Low-budget Shinka config template for figure evolution. Optional.
# `shinka-run` is the authoritative guide for running batches; this file is
# only a starting point.

max_evaluation_jobs: 3
max_proposal_jobs: 3
max_db_workers: 2

db_config:
  db_path: evolution_db.sqlite
  num_islands: 2
  archive_size: 30
  elite_selection_ratio: 0.3
  num_archive_inspirations: 3
  num_top_k_inspirations: 2
  migration_interval: 10
  migration_rate: 0.1
  island_elitism: true
  enforce_island_separation: true
  parent_selection_strategy: weighted
  parent_selection_lambda: 10

evo_config:
  patch_types: [diff, full, cross]
  patch_type_probs: [0.6, 0.3, 0.1]
  num_generations: 40        # figure judging is expensive; keep low
  max_api_costs: 0.25
  use_text_feedback: true    # pass text_feedback to proposal LLMs for natural-language guidance
  max_patch_resamples: 3
  max_patch_attempts: 3
  max_novelty_attempts: 3
  job_type: local
  language: python
  llm_models: ["gemini-3-flash-preview"]  # default: gemini only; confirm with user before adding others
  llm_kwargs:
    temperatures: [0.3, 0.7, 1.0]
    max_tokens: 32768
  meta_rec_interval: 20
  meta_llm_models: ["gemini-3-flash-preview"]  # default: gemini only
  meta_llm_kwargs:
    temperatures: [0]
    max_tokens: 16384
  embedding_model: text-embedding-3-small
  code_embed_sim_threshold: 0.99
  novelty_llm_models: ["gemini-3-flash-preview"]  # default: gemini only
  novelty_llm_kwargs:
    temperatures: [0]
  init_program_path: initial.py
  llm_dynamic_selection: ucb1
  llm_dynamic_selection_kwargs:
    exploration_coef: 1
  results_dir: results/results_figure
